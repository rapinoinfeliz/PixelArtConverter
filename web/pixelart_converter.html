<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pixel Art Converter</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');

    :root {
      --sky-a: #10233f;
      --sky-b: #1f3f67;
      --sky-c: #2d5b89;
      --panel: #1a2f48;
      --panel-dark: #102338;
      --line-dark: #091424;
      --line-light: #6ea4d7;
      --text: #f4f8ff;
      --muted: #bfd2ea;
      --accent: #ffd23f;
      --accent-shadow: #9b6f0f;
      --cyan: #47d6ff;
      --ok: #58de7a;
      --danger: #ff7d76;
      --checker-a: #24425f;
      --checker-b: #1a334d;
    }

    * {
      box-sizing: border-box;
      image-rendering: pixelated;
    }

    body {
      margin: 0;
      height: 100vh;
      font-family: 'VT323', monospace;
      font-size: 18px;
      color: var(--text);
      background:
        linear-gradient(180deg, var(--sky-c) 0 14%, transparent 14% 100%),
        repeating-linear-gradient(
          0deg,
          rgba(255, 255, 255, 0.04) 0 2px,
          transparent 2px 4px
        ),
        linear-gradient(180deg, var(--sky-a), var(--sky-b));
      padding: 12px;
      overflow: hidden;
    }

    .shell {
      max-width: 1500px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(300px, 380px) 1fr;
      gap: 12px;
      align-items: stretch;
      height: calc(100vh - 24px);
    }

    .panel {
      position: relative;
      background: linear-gradient(180deg, var(--panel), var(--panel-dark));
      border: 4px solid var(--line-dark);
      outline: 3px solid var(--line-light);
      box-shadow: 6px 6px 0 rgba(0, 0, 0, 0.35);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .panel::before {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        repeating-linear-gradient(
          90deg,
          rgba(255, 255, 255, 0.05) 0 2px,
          transparent 2px 6px
        );
      mix-blend-mode: screen;
      opacity: 0.3;
    }

    .controls {
      padding: 12px;
      gap: 8px;
      overflow: auto;
    }

    .brand {
      margin: 0 0 10px;
      display: flex;
      align-items: center;
      gap: 0;
    }

    .brand-text {
      display: grid;
      gap: 3px;
      min-width: 0;
    }

    .title {
      margin: 0 0 6px;
      font-family: 'Press Start 2P', monospace;
      letter-spacing: 0.9px;
      font-size: 13px;
      line-height: 1.45;
      color: var(--accent);
      text-shadow: 2px 2px 0 var(--accent-shadow);
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.1;
    }

    .drop-zone {
      border: 2px dashed rgba(110, 164, 215, 0.7);
      padding: 8px;
      background: rgba(8, 19, 32, 0.22);
      transition: border-color 120ms ease, background-color 120ms ease;
    }

    .drop-zone.active {
      border-color: var(--accent);
      background: rgba(255, 210, 63, 0.15);
    }

    .field {
      margin-bottom: 6px;
      display: grid;
      gap: 3px;
    }

    .hint {
      margin: 0;
      font-size: 15px;
      line-height: 1.1;
      color: var(--muted);
      letter-spacing: 0.2px;
    }

    .hint strong {
      color: var(--accent);
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      letter-spacing: 0.2px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    label {
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      line-height: 1.4;
      color: #d3e7ff;
      text-transform: uppercase;
      letter-spacing: 0.45px;
    }

    input,
    select,
    button {
      width: 100%;
      min-height: 34px;
      border: 3px solid var(--line-dark);
      outline: 2px solid #4f7baa;
      border-radius: 0;
      background: #162b43;
      color: var(--text);
      padding: 4px 8px;
      font-family: 'VT323', monospace;
      font-size: 20px;
      line-height: 1;
    }

    input:disabled,
    select:disabled {
      opacity: 0.56;
      cursor: not-allowed;
      filter: grayscale(0.25);
    }

    input:focus,
    select:focus,
    button:focus {
      outline: 2px solid var(--cyan);
      border-color: #0c1a2d;
    }

    input[type="checkbox"] {
      width: 18px;
      min-height: 18px;
      border: 2px solid var(--line-dark);
      outline: 2px solid #4f7baa;
      margin: 0;
      accent-color: var(--accent);
    }

    input[type="file"] {
      padding: 0;
      overflow: hidden;
      cursor: pointer;
    }

    input[type="file"]::file-selector-button {
      height: 100%;
      border: 0;
      border-right: 3px solid #4b3205;
      background: linear-gradient(180deg, #ffd861, #f59e22);
      color: #1f1804;
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      letter-spacing: 0.3px;
      padding: 0 10px;
      margin-right: 8px;
      cursor: pointer;
      box-shadow: inset -2px 0 0 rgba(0, 0, 0, 0.2);
    }

    input[type="file"]::-webkit-file-upload-button {
      height: 100%;
      border: 0;
      border-right: 3px solid #4b3205;
      background: linear-gradient(180deg, #ffd861, #f59e22);
      color: #1f1804;
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      letter-spacing: 0.3px;
      padding: 0 10px;
      margin-right: 8px;
      cursor: pointer;
      box-shadow: inset -2px 0 0 rgba(0, 0, 0, 0.2);
    }

    .check {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 2px 0 6px;
      font-family: 'VT323', monospace;
      font-size: 20px;
      line-height: 1;
      color: #dbebff;
      text-transform: none;
      letter-spacing: 0;
    }

    button {
      cursor: pointer;
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      letter-spacing: 0.45px;
      text-transform: uppercase;
      box-shadow: 0 4px 0 rgba(0, 0, 0, 0.35);
      transition: transform 80ms steps(2, end), filter 80ms steps(2, end);
    }

    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.06);
    }

    button:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 rgba(0, 0, 0, 0.35);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      filter: grayscale(0.4);
    }

    .btn-accent {
      background: linear-gradient(180deg, #ffd861, #f59e22);
      color: #1f1804;
      border-color: #4b3205;
      outline-color: #d28b24;
    }

    .btn-soft {
      background: linear-gradient(180deg, #61d4ff, #2f77d9);
      color: #081624;
      border-color: #0b2c52;
      outline-color: #4ca5f7;
    }

    .actions {
      display: grid;
      gap: 6px;
      margin-top: 4px;
    }

    .status {
      margin-top: 6px;
      padding: 6px;
      border: 3px solid #0d1f36;
      outline: 2px solid #4c739e;
      background: rgba(18, 43, 70, 0.78);
      font-family: 'VT323', monospace;
      font-size: 20px;
      line-height: 1.1;
      color: #d5e8ff;
      min-height: 36px;
      display: flex;
      align-items: center;
    }

    .status.ok {
      border-color: #12412b;
      outline-color: rgba(88, 222, 122, 0.64);
      color: #bff6d0;
    }

    .status.err {
      border-color: #4c1616;
      outline-color: rgba(255, 125, 118, 0.6);
      color: #ffd2cf;
    }

    .view {
      padding: 8px;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      gap: 8px;
      min-height: 0;
    }

    .view-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      min-height: 0;
    }

    .card {
      border: 3px solid var(--line-dark);
      outline: 2px solid #4f7baa;
      background: rgba(13, 31, 50, 0.84);
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .card-head {
      padding: 6px 8px;
      border-bottom: 3px solid #0f2239;
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      letter-spacing: 0.4px;
      color: #d4e8ff;
      text-transform: uppercase;
      background:
        linear-gradient(180deg, rgba(117, 168, 218, 0.16), rgba(30, 52, 79, 0.32));
    }

    .canvas-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      aspect-ratio: 1 / 1;
      background:
        linear-gradient(45deg, var(--checker-a) 25%, transparent 25%),
        linear-gradient(-45deg, var(--checker-a) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, var(--checker-a) 75%),
        linear-gradient(-45deg, transparent 75%, var(--checker-a) 75%),
        var(--checker-b);
      background-size: 24px 24px;
      background-position: 0 0, 0 12px, 12px -12px, -12px 0;
      padding: 8px;
      overflow: hidden;
      min-height: 0;
      position: relative;
      cursor: default;
      user-select: none;
      touch-action: none;
    }

    .canvas-wrap.can-pan {
      cursor: grab;
    }

    .canvas-wrap.dragging {
      cursor: grabbing;
    }

    canvas {
      width: 320px;
      height: 320px;
      min-width: 320px;
      min-height: 320px;
      border: 3px solid #0f2239;
      outline: 2px solid #4575a9;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      background: #0d1a2b;
      display: block;
      transform-origin: center center;
      pointer-events: none;
      transition: transform 110ms ease-out;
    }

    .canvas-wrap.dragging canvas {
      transition: none;
    }

    .palette {
      min-height: 42px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(48px, 1fr));
      gap: 5px;
      padding: 8px;
      max-height: 140px;
      overflow: auto;
    }

    .palette-actions {
      display: flex;
      gap: 10px;
      padding: 0 8px 8px 8px;
    }

    .erase-color {
      position: absolute;
      top: 0;
      right: 0;
      width: 14px;
      height: 14px;
      background: #ff4747;
      color: white;
      font-size: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 10;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .swatch:hover .erase-color {
      opacity: 1;
    }

    .swatch.hidden-color {
      opacity: 0.4;
    }
    .swatch.hidden-color .erase-color {
      opacity: 1;
    }

    .swatch {
      height: 28px;
      border: 2px solid #0c1d32;
      outline: 1px solid rgba(210, 231, 255, 0.3);
      position: relative;
      overflow: hidden;
    }

    .swatch {
      cursor: pointer;
    }

    .swatch.selected {
      outline: 2px solid var(--accent);
      border-color: #fff;
      z-index: 2;
      transform: scale(1.08);
      box-shadow: 0 0 8px rgba(255, 210, 63, 0.6);
    }

    .swatch input[type="color"] {
      position: absolute;
      opacity: 0;
      inset: -10px;
      width: 200%;
      height: 200%;
      cursor: pointer;
    }

    .swatch code {
      position: absolute;
      left: 4px;
      bottom: 1px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.92);
      text-shadow: 1px 1px 0 rgba(0, 0, 0, 0.85);
      font-family: 'VT323', monospace;
      line-height: 1;
      letter-spacing: 0.25px;
      pointer-events: none;
    }

    @media (max-width: 1024px) {
      body {
        height: auto;
        min-height: 100vh;
        overflow: auto;
        padding: 10px;
      }

      .shell {
        height: auto;
        grid-template-columns: 1fr;
      }

      .view-grid {
        grid-template-columns: 1fr;
      }

      canvas {
        width: 280px;
        height: 280px;
        min-width: 280px;
        min-height: 280px;
      }
    }

    @media (max-width: 640px) {
      body {
        font-size: 16px;
      }

      .title {
        font-size: 10px;
      }

      .subtitle {
        font-size: 12px;
      }

      input,
      select {
        font-size: 18px;
      }

      button {
        font-size: 8px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="panel controls">
      <div class="brand">
        <div class="brand-text">
          <h1 class="title">Pixel Art Converter</h1>
          <p class="subtitle">
            Faz upload da imagem, reduz para grid real e limita a paleta para deixar o sprite consistente.
          </p>
        </div>
      </div>

      <div class="field drop-zone" id="dropZone">
        <label for="imageInput">Imagem</label>
        <input id="imageInput" type="file" accept="image/*" />
        <p class="hint">Cole com <strong>Ctrl+V</strong>/<strong>Cmd+V</strong> ou arraste e solte aqui.</p>
      </div>

      <div class="row">
        <div class="field" style="position: relative;">
          <label for="targetWidth">Largura final (px)</label>
          <button id="autoDetectScaleBtn" class="btn-soft" style="position: absolute; top: -3px; right: 0; padding: 2px 6px; font-size: 10px; min-width: 0; width: auto;" type="button" disabled title="Detectar o tamanho ideal do pixel">🪄 Auto</button>
          <input id="targetWidth" type="number" min="1" max="512" step="1" value="64" />
        </div>
        <div class="field">
          <label for="targetHeight">Altura final (px)</label>
          <input id="targetHeight" type="number" min="1" max="512" step="1" value="64" />
        </div>
      </div>

      <label class="check" for="lockAspect">
        <input id="lockAspect" type="checkbox" checked />
        Manter proporcao original
      </label>

      <div class="field">
        <label for="palettePreset">Paleta predefinida</label>
        <select id="palettePreset">
          <option value="auto">Auto (k-means)</option>
          <option value="detect">Detectar Cores Originais</option>
          <option value="gameboy">Game Boy (4)</option>
          <option value="pico8">PICO-8 (16)</option>
          <option value="dawnbringer16">DawnBringer16 (16)</option>
          <option value="c64">Commodore 64 (16)</option>
          <option value="endesga32">Endesga 32 (32)</option>
          <option value="masterSystem">Master System (32)</option>
        </select>
        <p class="hint">Auto cria paleta da imagem. As demais usam paletas fixas retro.</p>
      </div>

      <div class="row">
        <div class="field">
          <label for="numColors">Cores (paleta)</label>
          <input id="numColors" type="number" min="2" max="64" step="1" value="16" />
        </div>
        <div class="field">
          <label for="iterations">Iteracoes k-means</label>
          <input id="iterations" type="number" min="1" max="20" step="1" value="8" />
        </div>
      </div>

      <div class="row">
        <div class="field">
          <label for="previewScale">Escala preview (x)</label>
          <input id="previewScale" type="number" min="1" max="24" step="1" value="8" />
        </div>
        <div class="field">
          <label for="downloadMode">Download</label>
          <select id="downloadMode">
            <option value="low">Sprite real (baixa resolucao)</option>
            <option value="scaled">Imagem ampliada</option>
          </select>
        </div>
      </div>

      <label class="check" for="useDither">
        <input id="useDither" type="checkbox" />
        Aplicar dithering (Floyd-Steinberg)
      </label>

      <div class="actions">
        <button id="convertBtn" class="btn-accent" type="button">Converter para Pixel Art</button>
        <button id="downloadBtn" class="btn-soft" type="button" disabled>Baixar PNG</button>
      </div>

      <div id="status" class="status">Aguardando imagem...</div>
    </section>

    <section class="panel view">
      <div class="view-grid">
        <article class="card">
          <div class="card-head">Entrada</div>
          <div class="canvas-wrap" id="inputWrap">
            <canvas id="inputCanvas" width="320" height="320"></canvas>
          </div>
        </article>

        <article class="card">
          <div class="card-head">Saida Pixel Art</div>
          <div class="canvas-wrap" id="outputWrap">
            <canvas id="outputCanvas" width="320" height="320" hidden></canvas>
          </div>
        </article>
      </div>

      <article class="card">
        <div class="card-head">Paleta final</div>
        <div id="palette" class="palette"></div>
        <div class="palette-actions">
          <button id="savePaletteBtn" class="btn-soft" type="button" disabled>💾 Salvar Paleta Atual</button>
        </div>
      </article>
    </section>
  </main>

  <script>
    (function() {
      const imageInput = document.getElementById('imageInput');
      const targetWidthInput = document.getElementById('targetWidth');
      const targetHeightInput = document.getElementById('targetHeight');
      const lockAspectInput = document.getElementById('lockAspect');
      const palettePresetInput = document.getElementById('palettePreset');
      const numColorsInput = document.getElementById('numColors');
      const iterationsInput = document.getElementById('iterations');
      const previewScaleInput = document.getElementById('previewScale');
      const useDitherInput = document.getElementById('useDither');
      const downloadModeInput = document.getElementById('downloadMode');
      const convertBtn = document.getElementById('convertBtn');
      const downloadBtn = document.getElementById('downloadBtn');
      const statusEl = document.getElementById('status');
      const paletteEl = document.getElementById('palette');
      const savePaletteBtn = document.getElementById('savePaletteBtn');
      const autoDetectScaleBtn = document.getElementById('autoDetectScaleBtn');
      const dropZone = document.getElementById('dropZone');
      const inputWrap = document.getElementById('inputWrap');
      const outputWrap = document.getElementById('outputWrap');
      const inputCanvas = document.getElementById('inputCanvas');
      const outputCanvas = document.getElementById('outputCanvas');

      const state = {
        image: null,
        fileName: 'pixel_art',
        lowResCanvas: null,
        scaledCanvas: null,
        palette: [],
        viewerZoom: 1,
        viewerZoomTarget: 1,
        viewerZoomAnimFrame: null,
        viewerPanX: 0,
        viewerPanY: 0,
        dragState: null
      };

      const VIEW_ZOOM_MIN = 1;
      const VIEW_ZOOM_MAX = 8;

      const PRESET_PALETTES = {
        gameboy: {
          label: 'Game Boy (4)',
          colors: ['#0f380f', '#306230', '#8bac0f', '#9bbc0f']
        },
        pico8: {
          label: 'PICO-8 (16)',
          colors: ['#000000', '#1d2b53', '#7e2553', '#008751', '#ab5236', '#5f574f', '#c2c3c7', '#fff1e8', '#ff004d', '#ffa300', '#ffec27', '#00e436', '#29adff', '#83769c', '#ff77a8', '#ffccaa']
        },
        dawnbringer16: {
          label: 'DawnBringer16 (16)',
          colors: ['#140c1c', '#442434', '#30346d', '#4e4a4e', '#854c30', '#346524', '#d04648', '#757161', '#597dce', '#d27d2c', '#8595a1', '#6daa2c', '#d2aa99', '#6dc2ca', '#dad45e', '#deeed6']
        },
        c64: {
          label: 'Commodore 64 (16)',
          colors: ['#000000', '#ffffff', '#68372b', '#70a4b2', '#6f3d86', '#588d43', '#352879', '#b8c76f', '#6f4f25', '#433900', '#9a6759', '#444444', '#6c6c6c', '#9ad284', '#6c5eb5', '#959595']
        },
        endesga32: {
          label: 'Endesga 32 (32)',
          colors: ['#be4a2f', '#d77643', '#ead4aa', '#e4a672', '#b86f50', '#733e39', '#3e2731', '#a22633', '#e43b44', '#f77622', '#feae34', '#fee761', '#63c74d', '#3e8948', '#265c42', '#193c3e', '#124e89', '#0099db', '#2ce8f5', '#ffffff', '#c0cbdc', '#8b9bb4', '#5a6988', '#3a4466', '#262b44', '#181425', '#ff0044', '#68386c', '#b55088', '#f6757a', '#e8b796', '#c28569']
        },
        masterSystem: {
          label: 'Master System (32)',
          colors: ['#000000', '#0000aa', '#00aa00', '#00aaaa', '#aa0000', '#aa00aa', '#aa5500', '#aaaaaa', '#555555', '#5555ff', '#55ff55', '#55ffff', '#ff5555', '#ff55ff', '#ffff55', '#ffffff', '#000055', '#005500', '#005555', '#550000', '#550055', '#553300', '#555500', '#003355', '#335500', '#553355', '#335555', '#772200', '#227700', '#774477', '#447777', '#777744']
        }
      };

      function loadCustomPalettes() {
        try {
          const saved = localStorage.getItem('pixelart_custom_palettes');
          if (saved) {
            const customPalettes = JSON.parse(saved);
            for (const key in customPalettes) {
              PRESET_PALETTES[key] = customPalettes[key];
              const opt = document.createElement('option');
              opt.value = key;
              opt.textContent = `Salva: ${customPalettes[key].label}`;
              palettePresetInput.appendChild(opt);
            }
          }
        } catch (e) {
          console.error("Failed to load palettes from localStorage", e);
        }
      }
      loadCustomPalettes();

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function setStatus(message, tone = 'info') {
        statusEl.textContent = message;
        statusEl.className = 'status';
        if (tone === 'ok') statusEl.classList.add('ok');
        if (tone === 'err') statusEl.classList.add('err');
      }

      function getCleanInt(inputEl, min, max, fallback) {
        let value = parseInt(inputEl.value, 10);
        if (!Number.isFinite(value)) value = fallback;
        const clamped = clamp(value, min, max);
        if (clamped !== value) {
          setStatus(`Valor ajustado para o limite permitido (${min}-${max}).`, 'info');
        }
        inputEl.value = String(clamped);
        return clamped;
      }

      function getViewerPanBounds() {
        const wrapWidth = inputWrap.clientWidth;
        const wrapHeight = inputWrap.clientHeight;
        const baseWidth = inputCanvas.offsetWidth || 320;
        const baseHeight = inputCanvas.offsetHeight || 320;
        const scaledWidth = baseWidth * state.viewerZoom;
        const scaledHeight = baseHeight * state.viewerZoom;
        return {
          x: Math.max(0, (scaledWidth - wrapWidth) / 2),
          y: Math.max(0, (scaledHeight - wrapHeight) / 2)
        };
      }

      function clampViewerPan(x, y) {
        const bounds = getViewerPanBounds();
        return {
          x: clamp(x, -bounds.x, bounds.x),
          y: clamp(y, -bounds.y, bounds.y)
        };
      }

      function updatePanCursor() {
        const canPan = state.viewerZoom > 1.01;
        [inputWrap, outputWrap].forEach((wrap) => {
          wrap.classList.toggle('can-pan', canPan);
        });
      }

      function applyViewerZoom(zoomValue) {
        const clampedPan = clampViewerPan(state.viewerPanX, state.viewerPanY);
        state.viewerPanX = clampedPan.x;
        state.viewerPanY = clampedPan.y;

        [inputCanvas, outputCanvas].forEach((canvas) => {
          canvas.style.transform = `translate(${state.viewerPanX}px, ${state.viewerPanY}px) scale(${zoomValue})`;
        });
        updatePanCursor();
      }

      function animateViewerZoom() {
        const delta = state.viewerZoomTarget - state.viewerZoom;
        if (Math.abs(delta) < 0.005) {
          state.viewerZoom = state.viewerZoomTarget;
          applyViewerZoom(state.viewerZoom);
          state.viewerZoomAnimFrame = null;
          return;
        }

        state.viewerZoom += delta * 0.24;
        applyViewerZoom(state.viewerZoom);
        state.viewerZoomAnimFrame = window.requestAnimationFrame(animateViewerZoom);
      }

      function setViewerZoom(value, { instant = false } = {}) {
        const clampedZoom = Math.round(clamp(value, VIEW_ZOOM_MIN, VIEW_ZOOM_MAX) * 100) / 100;
        state.viewerZoomTarget = clampedZoom;

        if (instant) {
          if (state.viewerZoomAnimFrame) {
            window.cancelAnimationFrame(state.viewerZoomAnimFrame);
            state.viewerZoomAnimFrame = null;
          }
          state.viewerZoom = clampedZoom;
          applyViewerZoom(state.viewerZoom);
          return;
        }

        if (!state.viewerZoomAnimFrame) {
          state.viewerZoomAnimFrame = window.requestAnimationFrame(animateViewerZoom);
        }
      }

      function adjustViewerZoom(delta) {
        setViewerZoom(state.viewerZoomTarget + delta);
      }

      function startViewerDrag(event) {
        if (state.viewerZoom <= 1.01) return;
        if (event.button !== 0) return;
        event.preventDefault();
        state.dragState = {
          pointerId: event.pointerId,
          startX: event.clientX,
          startY: event.clientY,
          panX: state.viewerPanX,
          panY: state.viewerPanY
        };
        [inputWrap, outputWrap].forEach((wrap) => wrap.classList.add('dragging'));
      }

      function moveViewerDrag(event) {
        if (!state.dragState) return;
        if (event.pointerId !== state.dragState.pointerId) return;
        event.preventDefault();
        const dx = event.clientX - state.dragState.startX;
        const dy = event.clientY - state.dragState.startY;
        if (Math.abs(dx) > 3 || Math.abs(dy) > 3) state.dragState.moved = true;
        const pan = clampViewerPan(state.dragState.panX + dx, state.dragState.panY + dy);
        state.viewerPanX = pan.x;
        state.viewerPanY = pan.y;
        applyViewerZoom(state.viewerZoom);
      }

      function endViewerDrag(event) {
        if (!state.dragState) return;
        if (event && event.pointerId !== state.dragState.pointerId) return;
        state.wasDragged = state.dragState.moved;
        state.dragState = null;
        [inputWrap, outputWrap].forEach((wrap) => wrap.classList.remove('dragging'));
        updatePanCursor();
        setTimeout(() => state.wasDragged = false, 50);
      }

      function handleViewerWheel(event) {
        event.preventDefault();
        const rawDelta = -(event.deltaY * 0.0022);
        const delta = clamp(rawDelta, -0.4, 0.4);
        adjustViewerZoom(delta);
      }

      function resetOutputView() {
        outputCanvas.hidden = true;
        state.viewerPanX = 0;
        state.viewerPanY = 0;
        endViewerDrag();
        const outputCtx = outputCanvas.getContext('2d');
        outputCtx.clearRect(0, 0, outputCanvas.width, outputCanvas.height);
        paletteEl.innerHTML = '';
        state.lowResCanvas = null;
        state.scaledCanvas = null;
        state.palette = [];
        downloadBtn.disabled = true;
        savePaletteBtn.disabled = true;
      }

      function drawImageFit(canvas, source, smooth) {
        const ctx = canvas.getContext('2d');
        const canvasW = canvas.width;
        const canvasH = canvas.height;
        const ratio = Math.min(canvasW / source.width, canvasH / source.height);
        const drawW = Math.max(1, Math.round(source.width * ratio));
        const drawH = Math.max(1, Math.round(source.height * ratio));
        const x = Math.floor((canvasW - drawW) / 2);
        const y = Math.floor((canvasH - drawH) / 2);

        ctx.clearRect(0, 0, canvasW, canvasH);
        ctx.imageSmoothingEnabled = smooth;
        ctx.drawImage(source, x, y, drawW, drawH);
      }

      function rgbToHex(r, g, b) {
        const toHex = (v) => v.toString(16).padStart(2, '0');
        return `#${toHex(r)}${toHex(g)}${toHex(b)}`;
      }

      function hexToRgb(hex) {
        const normalized = (hex || '').replace('#', '');
        if (normalized.length !== 6) return [0, 0, 0];
        const value = parseInt(normalized, 16);
        if (!Number.isFinite(value)) return [0, 0, 0];
        return [(value >> 16) & 255, (value >> 8) & 255, value & 255];
      }

      function syncPaletteMode() {
        const useAuto = palettePresetInput.value === 'auto';
        numColorsInput.disabled = !useAuto;
        iterationsInput.disabled = !useAuto;
      }

      function extractOriginalPalette(data) {
        const uniqueColors = new Set();
        const colors = [];
        for (let i = 0; i < data.length; i += 4) {
          if (data[i+3] < 12) continue;
          const r = data[i];
          const g = data[i+1];
          const b = data[i+2];
          const key = (r << 16) | (g << 8) | b;
          if (!uniqueColors.has(key)) {
            uniqueColors.add(key);
            colors.push([r, g, b]);
            if (colors.length >= 128) break;
          }
        }
        if (colors.length === 0) return [[0,0,0]];
        return colors;
      }

      function getWorkingPalette(imageData, numColors, iterations) {
        const presetKey = palettePresetInput.value;
        if (presetKey === 'detect') {
          const colors = extractOriginalPalette(imageData.data);
          return { label: `Detectada (${colors.length})`, colors };
        }
        if (presetKey === 'auto') {
          const colors = buildPaletteKmeans(imageData.data, numColors, iterations);
          return { label: `Auto (${colors.length})`, colors };
        }

        const preset = PRESET_PALETTES[presetKey];
        if (!preset) {
          const colors = buildPaletteKmeans(imageData.data, numColors, iterations);
          return { label: `Auto (${colors.length})`, colors };
        }

        return { label: preset.label, colors: preset.colors.map(hexToRgb) };
      }

      function nearestColorIndex(r, g, b, palette) {
        let winner = 0;
        let bestDist = Infinity;

        for (let i = 0; i < palette.length; i += 1) {
          const color = palette[i];
          const dr = r - color[0];
          const dg = g - color[1];
          const db = b - color[2];
          const dist = (dr * dr) + (dg * dg) + (db * db);
          if (dist < bestDist) {
            bestDist = dist;
            winner = i;
          }
        }

        return winner;
      }

      function pickInitialCentroids(samples, k) {
        if (samples.length === 0) return [[0, 0, 0]];

        const colorCounts = new Map();
        for (let i = 0; i < samples.length; i++) {
          const [r, g, b] = samples[i];
          const key = (r << 16) | (g << 8) | b;
          colorCounts.set(key, (colorCounts.get(key) || 0) + 1);
        }

        const sortedColors = Array.from(colorCounts.entries())
          .sort((a, b) => b[1] - a[1])
          .map(entry => {
            const key = entry[0];
            return [(key >> 16) & 255, (key >> 8) & 255, key & 255];
          });

        const centroids = [];
        centroids.push(sortedColors[0]);

        const minDistance = 1000;

        for (let i = 1; i < sortedColors.length; i++) {
          if (centroids.length >= k) break;
          const candidate = sortedColors[i];
          let isDifferent = true;
          for (let j = 0; j < centroids.length; j++) {
            const [cr, cg, cb] = centroids[j];
            const dr = candidate[0] - cr;
            const dg = candidate[1] - cg;
            const db = candidate[2] - cb;
            if ((dr * dr + dg * dg + db * db) < minDistance) {
              isDifferent = false;
              break;
            }
          }
          if (isDifferent) centroids.push(candidate);
        }

        let i = 1;
        while (centroids.length < k && i < sortedColors.length) {
           const candidate = sortedColors[i];
           if (!centroids.some(c => c[0]===candidate[0] && c[1]===candidate[1] && c[2]===candidate[2])) {
               centroids.push(candidate);
           }
           i++;
        }

        while (centroids.length < k) {
            centroids.push(samples[Math.floor(Math.random() * samples.length)].slice());
        }

        return centroids;
      }

      function buildPaletteKmeans(data, k, iterations) {
        const pixelCount = data.length / 4;
        const maxSamples = 12000;
        const jump = Math.max(1, Math.floor(pixelCount / maxSamples));
        const samples = [];

        for (let i = 0; i < pixelCount; i += jump) {
          const idx = i * 4;
          const a = data[idx + 3];
          if (a < 12) continue;
          samples.push([data[idx], data[idx + 1], data[idx + 2]]);
        }

        if (samples.length === 0) {
          return [[0, 0, 0]];
        }

        const paletteSize = clamp(k, 1, samples.length);
        let centroids = pickInitialCentroids(samples, paletteSize);

        for (let step = 0; step < iterations; step += 1) {
          const sums = new Array(paletteSize).fill(null).map(() => [0, 0, 0]);
          const counts = new Array(paletteSize).fill(0);

          for (let i = 0; i < samples.length; i += 1) {
            const [r, g, b] = samples[i];
            const nearest = nearestColorIndex(r, g, b, centroids);
            sums[nearest][0] += r;
            sums[nearest][1] += g;
            sums[nearest][2] += b;
            counts[nearest] += 1;
          }

          for (let i = 0; i < paletteSize; i += 1) {
            if (counts[i] === 0) {
              centroids[i] = samples[Math.floor(Math.random() * samples.length)].slice();
              continue;
            }

            centroids[i] = [
              Math.round(sums[i][0] / counts[i]),
              Math.round(sums[i][1] / counts[i]),
              Math.round(sums[i][2] / counts[i])
            ];
          }
        }

        return centroids;
      }

      function quantizeWithoutDither(imageData, palette) {
        const data = imageData.data;
        const colorCache = new Map();

        for (let i = 0; i < data.length; i += 4) {
          if (data[i + 3] < 12) continue;

          const key = (data[i] << 16) | (data[i + 1] << 8) | data[i + 2];
          let picked = colorCache.get(key);

          if (!picked) {
            const idx = nearestColorIndex(data[i], data[i + 1], data[i + 2], palette);
            picked = palette[idx];
            colorCache.set(key, picked);
          }

          data[i] = picked[0];
          data[i + 1] = picked[1];
          data[i + 2] = picked[2];
        }
      }

      function applyFloydSteinbergDither(imageData, palette) {
        const width = imageData.width;
        const height = imageData.height;
        const data = imageData.data;
        const work = new Float32Array(data.length);

        for (let i = 0; i < data.length; i += 1) {
          work[i] = data[i];
        }

        const spread = (x, y, rErr, gErr, bErr, factor) => {
          if (x < 0 || x >= width || y < 0 || y >= height) return;
          const idx = ((y * width) + x) * 4;
          if (work[idx + 3] < 12) return;
          work[idx]     = clamp(work[idx]     + rErr * factor, 0, 255);
          work[idx + 1] = clamp(work[idx + 1] + gErr * factor, 0, 255);
          work[idx + 2] = clamp(work[idx + 2] + bErr * factor, 0, 255);
        };

        for (let y = 0; y < height; y += 1) {
          for (let x = 0; x < width; x += 1) {
            const idx = ((y * width) + x) * 4;
            if (work[idx + 3] < 12) continue;

            const oldR = clamp(work[idx],     0, 255);
            const oldG = clamp(work[idx + 1], 0, 255);
            const oldB = clamp(work[idx + 2], 0, 255);

            const nearest = palette[nearestColorIndex(oldR, oldG, oldB, palette)];
            const newR = nearest[0];
            const newG = nearest[1];
            const newB = nearest[2];

            data[idx] = newR;
            data[idx + 1] = newG;
            data[idx + 2] = newB;

            const rErr = oldR - newR;
            const gErr = oldG - newG;
            const bErr = oldB - newB;

            spread(x + 1, y,     rErr, gErr, bErr, 7 / 16);
            spread(x - 1, y + 1, rErr, gErr, bErr, 3 / 16);
            spread(x,     y + 1, rErr, gErr, bErr, 5 / 16);
            spread(x + 1, y + 1, rErr, gErr, bErr, 1 / 16);
          }
        }
      }

      function replaceColor(oldHex, newHex) {
        if (!state.lowResCanvas || !state.palette) return;

        const oldRgb = hexToRgb(oldHex);
        const newRgb = hexToRgb(newHex);

        const ctx = state.lowResCanvas.getContext('2d');
        const imgData = ctx.getImageData(0, 0, state.lowResCanvas.width, state.lowResCanvas.height);
        const data = imgData.data;

        for (let i = 0; i < data.length; i += 4) {
          if (data[i+3] < 12) continue;
          if (data[i] === oldRgb[0] && data[i+1] === oldRgb[1] && data[i+2] === oldRgb[2]) {
            data[i] = newRgb[0];
            data[i+1] = newRgb[1];
            data[i+2] = newRgb[2];
          }
        }
        ctx.putImageData(imgData, 0, 0);

        // Update scaled canvas
        const scale = getCleanInt(previewScaleInput, 1, 24, 8);
        const scaledCtx = state.scaledCanvas.getContext('2d');
        scaledCtx.imageSmoothingEnabled = false;
        scaledCtx.clearRect(0, 0, state.scaledCanvas.width, state.scaledCanvas.height);
        scaledCtx.drawImage(state.lowResCanvas, 0, 0, state.scaledCanvas.width, state.scaledCanvas.height);
        drawImageFit(outputCanvas, state.scaledCanvas, false);

        // Update palette state
        for (let i = 0; i < state.palette.length; i++) {
          const p = state.palette[i];
          if (p[0] === oldRgb[0] && p[1] === oldRgb[1] && p[2] === oldRgb[2]) {
            state.palette[i] = newRgb;
          }
        }
      }

      function replaceColor(oldHex, newHex) {
        if (!state.lowResCanvas || !state.palette || !state.workingData) return;

        const oldRgb = hexToRgb(oldHex);
        const newRgb = hexToRgb(newHex);

        const data = state.workingData;
        for (let i = 0; i < data.length; i += 4) {
          if (data[i+3] < 12) continue;
          if (data[i] === oldRgb[0] && data[i+1] === oldRgb[1] && data[i+2] === oldRgb[2]) {
            data[i] = newRgb[0];
            data[i+1] = newRgb[1];
            data[i+2] = newRgb[2];
          }
        }

        renderWorkingData();

        for (let i = 0; i < state.palette.length; i++) {
          const p = state.palette[i];
          if (p[0] === oldRgb[0] && p[1] === oldRgb[1] && p[2] === oldRgb[2]) {
            state.palette[i] = newRgb;
          }
        }
        
        if (state.hiddenColors && state.hiddenColors.has(oldHex)) {
          state.hiddenColors.delete(oldHex);
          state.hiddenColors.add(newHex);
        }
      }

      function toggleTransparent(hex, swatchEl) {
        if (!state.lowResCanvas || !state.workingData) return;
        if (!state.hiddenColors) state.hiddenColors = new Set();
        
        const isHidden = state.hiddenColors.has(hex);
        if (isHidden) {
          state.hiddenColors.delete(hex);
          swatchEl.classList.remove('hidden-color');
        } else {
          state.hiddenColors.add(hex);
          swatchEl.classList.add('hidden-color');
        }
        
        renderWorkingData();
      }

      function renderWorkingData() {
        const w = state.lowResCanvas.width;
        const h = state.lowResCanvas.height;
        const ctx = state.lowResCanvas.getContext('2d');
        const imgData = new ImageData(new Uint8ClampedArray(state.workingData), w, h);
        const data = imgData.data;
        
        if (state.hiddenColors && state.hiddenColors.size > 0) {
          const hiddenRgbs = Array.from(state.hiddenColors).map(hexToRgb);
          for (let i = 0; i < data.length; i += 4) {
            if (data[i+3] < 12) continue;
            for (const hr of hiddenRgbs) {
              if (data[i] === hr[0] && data[i+1] === hr[1] && data[i+2] === hr[2]) {
                data[i+3] = 0;
                break;
              }
            }
          }
        }
        
        ctx.putImageData(imgData, 0, 0);

        const scaledCtx = state.scaledCanvas.getContext('2d');
        scaledCtx.clearRect(0, 0, state.scaledCanvas.width, state.scaledCanvas.height);
        scaledCtx.imageSmoothingEnabled = false;
        scaledCtx.drawImage(state.lowResCanvas, 0, 0, state.scaledCanvas.width, state.scaledCanvas.height);
        drawImageFit(outputCanvas, state.scaledCanvas, false);
      }

      function updatePaletteUI(palette) {
        paletteEl.innerHTML = '';
        if (!palette || palette.length === 0) return;

        palette.forEach(([r, g, b]) => {
          const item = document.createElement('div');
          item.className = 'swatch';
          const hex = rgbToHex(r, g, b);
          item.style.background = hex;
          item.dataset.color = hex;
          
          if (state.hiddenColors && state.hiddenColors.has(hex)) {
            item.classList.add('hidden-color');
          }

          const label = document.createElement('code');
          label.textContent = hex;
          
          const eraseBtn = document.createElement('div');
          eraseBtn.className = 'erase-color';
          eraseBtn.title = "Alternar Transparência";
          
          const updateEraseIcon = () => {
             if (item.classList.contains('hidden-color')) {
                 eraseBtn.textContent = '👁️';
                 eraseBtn.style.background = '#47ff4a';
             } else {
                 eraseBtn.textContent = '🚫';
                 eraseBtn.style.background = '#ff4747';
             }
          };
          updateEraseIcon();
          
          eraseBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            e.preventDefault();
            toggleTransparent(item.dataset.color, item);
            updateEraseIcon();
          });
          
          const input = document.createElement('input');
          input.type = 'color';
          input.value = hex;
          input.addEventListener('input', (e) => {
            const newHex = e.target.value;
            item.style.background = newHex;
            label.textContent = newHex;
            replaceColor(item.dataset.color, newHex);
            item.dataset.color = newHex;
          });

          item.appendChild(label);
          item.appendChild(eraseBtn);
          item.appendChild(input);
          paletteEl.appendChild(item);
        });
      }

      function updateHeightFromWidth() {
        if (!state.image || !lockAspectInput.checked) return;
        const width = getCleanInt(targetWidthInput, 1, 512, 64);
        const ratio = state.image.height / state.image.width;
        const computedHeight = clamp(Math.round(width * ratio), 1, 512);
        targetHeightInput.value = String(computedHeight);
      }

      function handleImageFile(file, source = 'upload') {
        if (!file) return;
        if (!file.type.startsWith('image/')) {
          setStatus('Arquivo invalido. Use uma imagem (PNG, JPG, WebP...).', 'err');
          return;
        }

        const img = new Image();
        img.onload = () => {
          URL.revokeObjectURL(img.src);
          state.image = img;
          const rawName = file.name && file.name.trim() ? file.name : `imagem_colada_${Date.now()}.png`;
          state.fileName = rawName.replace(/\.[^.]+$/, '') || 'pixel_art';
          updateHeightFromWidth();
          drawImageFit(inputCanvas, img, true);
          resetOutputView();
          const messages = {
            paste: 'Imagem colada com sucesso. Clique em converter.',
            drop: 'Imagem arrastada com sucesso. Clique em converter.',
            upload: 'Imagem carregada. Clique em converter.'
          };
          setStatus(messages[source] || 'Imagem carregada.', 'ok');
          autoDetectScaleBtn.disabled = false;
        };
        img.onerror = () => setStatus('Nao foi possivel ler a imagem.', 'err');

        img.src = URL.createObjectURL(file);
      }

      function detectOptimalSize() {
        if (!state.image) return;
        
        const w = state.image.width;
        const h = state.image.height;
        if (w === 0 || h === 0) return;
        
        const canvas = document.createElement('canvas');
        canvas.width = w;
        canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(state.image, 0, 0);
        const data = ctx.getImageData(0, 0, w, h).data;
        
        const runLengths = {};
        
        const checkRun = (len) => {
          if (len > 2 && len < w / 2) {
            runLengths[len] = (runLengths[len] || 0) + 1;
          }
        };

        for (let y = 0; y < h; y++) {
          let currentRun = 1;
          let idx = y * w * 4;
          let lastR = data[idx], lastG = data[idx+1], lastB = data[idx+2];
          
          for (let x = 1; x < w; x++) {
            idx += 4;
            const r = data[idx], g = data[idx+1], b = data[idx+2];
            const diff = Math.abs(r-lastR) + Math.abs(g-lastG) + Math.abs(b-lastB);
            
            if (diff < 15) {
              currentRun++;
            } else {
              checkRun(currentRun);
              currentRun = 1;
              lastR = r; lastG = g; lastB = b;
            }
          }
          checkRun(currentRun);
        }
        
        let bestLen = 0;
        let maxCount = 0;
        for (const len in runLengths) {
          if (runLengths[len] > maxCount) {
            maxCount = runLengths[len];
            bestLen = parseInt(len, 10);
          }
        }
        
        if (bestLen > 0) {
          const targetW = Math.round(w / bestLen);
          targetWidthInput.value = targetW;
          updateHeightFromWidth();
          setStatus(`Escala detectada: bloco de ${bestLen}px. Largura ideal sugerida: ${targetW}px.`, 'ok');
        } else {
          setStatus('Não foi possível detectar a escala com precisão.', 'err');
        }
      }

      function handlePaste(event) {
        const items = event.clipboardData?.items;
        if (!items || items.length === 0) return;

        for (const item of items) {
          if (!item.type.startsWith('image/')) continue;
          const pastedFile = item.getAsFile();
          if (!pastedFile) continue;
          event.preventDefault();
          handleImageFile(pastedFile, 'paste');
          return;
        }
      }

      function extractImageFile(fileList) {
        if (!fileList || fileList.length === 0) return null;
        for (const file of fileList) {
          if (file.type && file.type.startsWith('image/')) {
            return file;
          }
        }
        return null;
      }

      function handleDropZoneHover(event) {
        event.preventDefault();
        dropZone.classList.add('active');
      }

      function handleDropZoneLeave(event) {
        event.preventDefault();
        dropZone.classList.remove('active');
      }

      function handleDropZoneDrop(event) {
        event.preventDefault();
        dropZone.classList.remove('active');
        const imageFile = extractImageFile(event.dataTransfer?.files);
        if (!imageFile) {
          setStatus('Arraste um arquivo de imagem valido.', 'err');
          return;
        }
        handleImageFile(imageFile, 'drop');
      }

      function updateScaledPreview() {
        if (!state.lowResCanvas) return;
        const scale = getCleanInt(previewScaleInput, 1, 24, 8);
        const scaledCanvas = document.createElement('canvas');
        scaledCanvas.width = state.lowResCanvas.width * scale;
        scaledCanvas.height = state.lowResCanvas.height * scale;
        const ctx = scaledCanvas.getContext('2d');
        ctx.imageSmoothingEnabled = false;
        ctx.drawImage(state.lowResCanvas, 0, 0, scaledCanvas.width, scaledCanvas.height);
        state.scaledCanvas = scaledCanvas;
        drawImageFit(outputCanvas, scaledCanvas, false);
        setStatus(`Escala de preview alterada para ${scale}x.`, 'ok');
      }

      function convertImage() {
        if (!state.image) {
          setStatus('Envie uma imagem primeiro.', 'err');
          return;
        }

        convertBtn.disabled = true;
        downloadBtn.disabled = true;
        setStatus('Processando...');

        const targetW = getCleanInt(targetWidthInput, 1, 512, 64);
        let targetH = getCleanInt(targetHeightInput, 1, 512, 64);
        if (lockAspectInput.checked) {
          const ratio = state.image.height / state.image.width;
          targetH = clamp(Math.round(targetW * ratio), 1, 512);
          targetHeightInput.value = String(targetH);
        }

        const numColors = getCleanInt(numColorsInput, 2, 64, 16);
        const iterations = getCleanInt(iterationsInput, 1, 20, 8);
        const previewScale = getCleanInt(previewScaleInput, 1, 24, 8);
        const useDither = useDitherInput.checked;

        window.requestAnimationFrame(() => {
          const lowCanvas = document.createElement('canvas');
          lowCanvas.width = targetW;
          lowCanvas.height = targetH;
          const lowCtx = lowCanvas.getContext('2d', { willReadFrequently: true });

          lowCtx.imageSmoothingEnabled = false;
          lowCtx.clearRect(0, 0, targetW, targetH);
          lowCtx.drawImage(state.image, 0, 0, targetW, targetH);

          const imageData = lowCtx.getImageData(0, 0, targetW, targetH);
          const paletteSelection = getWorkingPalette(imageData, numColors, iterations);
          const palette = paletteSelection.colors;

          if (useDither) {
            applyFloydSteinbergDither(imageData, palette);
          } else {
            quantizeWithoutDither(imageData, palette);
          }
          
          state.workingData = new Uint8ClampedArray(imageData.data);
          state.hiddenColors = new Set();

          lowCtx.putImageData(imageData, 0, 0);

          const scaledCanvas = document.createElement('canvas');
          scaledCanvas.width = targetW * previewScale;
          scaledCanvas.height = targetH * previewScale;
          const scaledCtx = scaledCanvas.getContext('2d');
          scaledCtx.imageSmoothingEnabled = false;
          scaledCtx.drawImage(lowCanvas, 0, 0, scaledCanvas.width, scaledCanvas.height);

          state.lowResCanvas = lowCanvas;
          state.scaledCanvas = scaledCanvas;
          state.palette = palette;

          // Reset zoom/pan para a nova imagem
          state.viewerPanX = 0;
          state.viewerPanY = 0;
          setViewerZoom(1, { instant: true });

          outputCanvas.hidden = false;
          drawImageFit(outputCanvas, scaledCanvas, false);
          updatePaletteUI(palette);

          convertBtn.disabled = false;
          downloadBtn.disabled = false;
          savePaletteBtn.disabled = false;
          setStatus(
            `Pronto: ${targetW}x${targetH}px, ${palette.length} cores, paleta ${paletteSelection.label}, escala ${previewScale}x.`,
            'ok'
          );
        });
      }

      function downloadResult() {
        if (!state.lowResCanvas || !state.scaledCanvas) {
          setStatus('Converta a imagem antes de baixar.', 'err');
          return;
        }

        const mode = downloadModeInput.value;
        const canvasToSave = mode === 'scaled' ? state.scaledCanvas : state.lowResCanvas;
        const suffix = mode === 'scaled' ? 'scaled' : 'sprite';

        const link = document.createElement('a');
        link.href = canvasToSave.toDataURL('image/png');
        link.download = `${state.fileName}_${suffix}_${canvasToSave.width}x${canvasToSave.height}.png`;
        link.click();

        setStatus(`Download iniciado (${canvasToSave.width}x${canvasToSave.height}).`, 'ok');
      }

      // --- Event Listeners ---
      imageInput.addEventListener('change', (event) => {
        handleImageFile(event.target.files?.[0]);
      });

      palettePresetInput.addEventListener('change', syncPaletteMode);
      targetWidthInput.addEventListener('input', updateHeightFromWidth);
      lockAspectInput.addEventListener('change', updateHeightFromWidth);

      // Atualização dinâmica da escala de preview
      previewScaleInput.addEventListener('input', updateScaledPreview);

      document.addEventListener('paste', handlePaste);
      inputWrap.addEventListener('wheel', handleViewerWheel, { passive: false });
      outputWrap.addEventListener('wheel', handleViewerWheel, { passive: false });
      inputWrap.addEventListener('pointerdown', startViewerDrag);
      outputWrap.addEventListener('pointerdown', startViewerDrag);
      
      outputWrap.addEventListener('click', (event) => {
        if (!state.lowResCanvas || state.wasDragged) return;
        
        const rect = outputCanvas.getBoundingClientRect();
        const clientX = event.clientX;
        const clientY = event.clientY;
        
        if (clientX < rect.left || clientX > rect.right || clientY < rect.top || clientY > rect.bottom) return;
        
        const scaleX = state.lowResCanvas.width / rect.width;
        const scaleY = state.lowResCanvas.height / rect.height;
        
        const x = Math.floor((clientX - rect.left) * scaleX);
        const y = Math.floor((clientY - rect.top) * scaleY);
        
        const ctx = state.lowResCanvas.getContext('2d');
        const data = ctx.getImageData(x, y, 1, 1).data;
        
        if (data[3] < 12) return;
        
        const hex = rgbToHex(data[0], data[1], data[2]);
        
        document.querySelectorAll('#palette .swatch').forEach(swatch => {
          if (swatch.dataset.color === hex) {
            swatch.classList.add('selected');
            swatch.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
          } else {
            swatch.classList.remove('selected');
          }
        });
      });

      window.addEventListener('pointermove', moveViewerDrag);
      window.addEventListener('pointerup', endViewerDrag);
      window.addEventListener('pointercancel', endViewerDrag);
      dropZone.addEventListener('dragenter', handleDropZoneHover);
      dropZone.addEventListener('dragover', handleDropZoneHover);
      dropZone.addEventListener('dragleave', handleDropZoneLeave);
      dropZone.addEventListener('drop', handleDropZoneDrop);
      document.addEventListener('dragover', (event) => {
        if (extractImageFile(event.dataTransfer?.files)) {
          event.preventDefault();
        }
      });
      document.addEventListener('dragleave', (event) => {
        if (event.target === document.documentElement || event.target === document.body) {
          dropZone.classList.remove('active');
        }
      });
      document.addEventListener('drop', (event) => {
        const imageFile = extractImageFile(event.dataTransfer?.files);
        if (!imageFile) return;
        event.preventDefault();
        dropZone.classList.remove('active');
        if (dropZone.contains(event.target)) return;
        handleImageFile(imageFile, 'drop');
      });

      convertBtn.addEventListener('click', convertImage);
      downloadBtn.addEventListener('click', downloadResult);
      autoDetectScaleBtn.addEventListener('click', detectOptimalSize);
      autoDetectScaleBtn.addEventListener('click', detectOptimalSize);

      savePaletteBtn.addEventListener('click', () => {
        if (!state.palette || state.palette.length === 0) return;
        const name = prompt('Digite um nome para salvar esta paleta:');
        if (!name || name.trim() === '') return;
        
        const key = 'custom_' + Date.now();
        const customPalette = {
          label: name.trim(),
          colors: state.palette.map(([r,g,b]) => rgbToHex(r,g,b))
        };
        
        let customPalettes = {};
        try {
          const saved = localStorage.getItem('pixelart_custom_palettes');
          if (saved) customPalettes = JSON.parse(saved);
        } catch(e) {}
        
        customPalettes[key] = customPalette;
        localStorage.setItem('pixelart_custom_palettes', JSON.stringify(customPalettes));
        
        PRESET_PALETTES[key] = customPalette;
        const opt = document.createElement('option');
        opt.value = key;
        opt.textContent = `Salva: ${customPalette.label}`;
        palettePresetInput.appendChild(opt);
        palettePresetInput.value = key;
        syncPaletteMode();
        
        setStatus(`Paleta "${customPalette.label}" salva com sucesso!`, 'ok');
      });

      // Atalhos de teclado
      document.addEventListener('keydown', (event) => {
        if (event.ctrlKey || event.metaKey) {
          if (event.key === 'Enter') {
            event.preventDefault();
            convertImage();
          } else if (event.key === 's') {
            event.preventDefault();
            downloadResult();
          }
        }
      });

      syncPaletteMode();
      resetOutputView();
      setViewerZoom(1, { instant: true });
    })();
  </script>
</body>
</html>
